<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flocs Focus Timer</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (via CDN for single file) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }

        /* Background Layer */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            /* Default dark overlay */
        }
        
        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: rgba(0, 0, 0, 0.4); /* Darkens the background for readability */
            backdrop-filter: blur(5px);     /* Default blur */
            -webkit-backdrop-filter: blur(5px);
            transition: backdrop-filter 0.2s; /* Smooth transition for slider */
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Timer Font */
        .timer-font {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #68D391;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #68D391;
        }

        /* Custom Scrollbar for Settings */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4); 
        }

        /* Fade transitions */
        .fade-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .fade-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms, transform 300ms;
        }
        .fade-exit {
            opacity: 1;
            transform: scale(1);
        }
        .fade-exit-active {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 300ms, transform 300ms;
        }
    </style>
</head>
<body class="text-white h-screen w-screen flex flex-col justify-center items-center relative select-none">

    <!-- Dynamic Background -->
    <div id="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2532&auto=format&fit=crop');"></div>
    <div id="bg-overlay"></div>

    <!-- Main Timer Container -->
    <div class="relative z-10 flex flex-col items-center">
        
        <!-- Mode Switcher Pills -->
        <div class="glass-panel rounded-full p-1.5 flex gap-1 mb-8 shadow-2xl">
            <button onclick="setMode('focus')" id="btn-focus" class="px-6 py-2 rounded-full text-sm font-medium transition-all bg-white text-black shadow-md">Focus</button>
            <button onclick="setMode('short')" id="btn-short" class="px-6 py-2 rounded-full text-sm font-medium transition-all hover:bg-white/10 text-white/70 hover:text-white">Short Break</button>
            <button onclick="setMode('long')" id="btn-long" class="px-6 py-2 rounded-full text-sm font-medium transition-all hover:bg-white/10 text-white/70 hover:text-white">Long Break</button>
        </div>

        <!-- The Timer -->
        <div class="text-center mb-10 relative group">
            <div id="timer-display" class="timer-font text-[9rem] md:text-[12rem] font-bold leading-none tracking-tight drop-shadow-2xl transition-colors duration-300">
                25:00
            </div>
            <!-- Status Label -->
            <div id="status-label" class="text-xl opacity-60 font-light mt-2 tracking-widest uppercase">
                Time to Focus
            </div>
        </div>

        <!-- Main Controls -->
        <div class="flex items-center gap-6">
            <button onclick="toggleTimer()" id="main-action-btn" class="bg-white text-black hover:bg-gray-200 transition-colors w-24 h-24 rounded-3xl flex items-center justify-center shadow-lg hover:shadow-xl hover:scale-105 active:scale-95 duration-200">
                <i class="ph-fill ph-play text-4xl" id="play-icon"></i>
            </button>
            
            <button onclick="resetTimer()" class="glass-panel w-16 h-16 rounded-2xl flex items-center justify-center hover:bg-white/20 transition-all hover:scale-105 active:scale-95 duration-200" title="Reset">
                <i class="ph-bold ph-arrow-counter-clockwise text-2xl"></i>
            </button>
        </div>

    </div>

    <!-- Bottom Right Controls -->
    <div class="absolute bottom-8 right-8 flex gap-4">
        <button onclick="openSettings()" class="glass-panel p-3 rounded-xl hover:bg-white/20 transition-all text-white/90 hover:text-white" title="Settings">
            <i class="ph-fill ph-gear text-2xl"></i>
        </button>
        <button onclick="toggleFullscreen()" class="glass-panel p-3 rounded-xl hover:bg-white/20 transition-all text-white/90 hover:text-white" title="Fullscreen">
            <i class="ph-fill ph-corners-out text-2xl"></i>
        </button>
    </div>

    <!-- Settings Modal (Hidden by default) -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeSettings()"></div>
        
        <!-- Modal Content -->
        <div class="glass-panel w-full max-w-md mx-4 rounded-3xl p-8 relative shadow-2xl transform transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i class="ph-fill ph-sliders-horizontal"></i> Settings
                </h2>
                <button onclick="closeSettings()" class="hover:bg-white/10 rounded-full p-2 transition-colors">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>

            <div class="space-y-6">
                <!-- Timer Settings -->
                <div>
                    <h3 class="text-xs uppercase tracking-wider opacity-60 mb-3 font-semibold">Timer (minutes)</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs opacity-70 mb-1">Focus</label>
                            <input type="number" id="input-focus" value="25" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-center focus:outline-none focus:border-white/40 transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs opacity-70 mb-1">Short Break</label>
                            <input type="number" id="input-short" value="5" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-center focus:outline-none focus:border-white/40 transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs opacity-70 mb-1">Long Break</label>
                            <input type="number" id="input-long" value="15" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-center focus:outline-none focus:border-white/40 transition-colors">
                        </div>
                    </div>
                </div>

                <!-- Background Settings -->
                <div>
                    <h3 class="text-xs uppercase tracking-wider opacity-60 mb-3 font-semibold">Appearance</h3>
                    
                    <!-- Blur Slider -->
                    <div class="mb-5">
                        <label class="flex justify-between text-xs opacity-70 mb-2">
                            <span>Background Blur</span>
                            <span id="blur-value-display">5px</span>
                        </label>
                        <input type="range" id="input-blur" min="0" max="50" step="1" class="w-full h-1.5 bg-white/20 rounded-lg appearance-none cursor-pointer hover:bg-white/30 transition-colors accent-white" oninput="previewBlur(this.value)">
                    </div>

                    <div class="space-y-3">
                        <label class="flex items-center justify-between p-3 rounded-lg bg-white/5 border border-white/10 cursor-pointer hover:bg-white/10 transition-colors group">
                            <span class="flex items-center gap-3">
                                <i class="ph-fill ph-image"></i>
                                <span>Custom Wallpaper</span>
                            </span>
                            <span class="text-xs bg-white/20 px-2 py-1 rounded text-white/80 group-hover:bg-white/30">Upload</span>
                            <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                        </label>
                        
                        <button onclick="clearCustomBackground()" class="w-full text-left p-3 rounded-lg bg-white/5 border border-white/10 text-red-300 hover:bg-red-500/20 hover:border-red-500/30 transition-colors flex items-center gap-3">
                            <i class="ph-fill ph-trash"></i>
                            Reset Background
                        </button>
                    </div>
                    <p class="text-[10px] opacity-40 mt-2 text-center">Images are saved locally. Large images may not persist due to browser storage limits.</p>
                </div>
            </div>

            <div class="mt-8 pt-4 border-t border-white/10 flex justify-end">
                <button onclick="saveSettings()" class="bg-white text-black px-6 py-2 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-lg active:scale-95">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        // --- State ---
        let timerInterval;
        let isRunning = false;
        let currentMode = 'focus'; // 'focus', 'short', 'long'
        let timeLeft = 25 * 60; // seconds
        let cyclesCount = 0; // Tracks completed focus cycles
        
        // Defaults
        let settings = {
            focus: 25,
            short: 5,
            long: 15,
            blur: 5
        };

        // DOM Elements
        const timerDisplay = document.getElementById('timer-display');
        const playIcon = document.getElementById('play-icon');
        const mainBtn = document.getElementById('main-action-btn');
        const statusLabel = document.getElementById('status-label');
        const bgLayer = document.getElementById('bg-layer');
        const bgOverlay = document.getElementById('bg-overlay');
        const alarmSound = document.getElementById('alarm-sound');

        // --- Initialization ---
        window.onload = function() {
            loadSettings();
            updateTimerDisplay();
        };

        // --- Timer Logic ---
        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            isRunning = true;
            playIcon.classList.remove('ph-play');
            playIcon.classList.add('ph-pause');
            mainBtn.classList.add('bg-gray-200'); // Active state indication
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            playIcon.classList.remove('ph-pause');
            playIcon.classList.add('ph-play');
            mainBtn.classList.remove('bg-gray-200');
        }

        function resetTimer() {
            pauseTimer();
            // Reset to the full duration of the current mode
            timeLeft = settings[currentMode] * 60;
            updateTimerDisplay();
        }

        function completeTimer() {
            pauseTimer();

            // Play alarm 3 times
            let beepCount = 0;
            const playSequence = () => {
                if (beepCount < 3) {
                    alarmSound.currentTime = 0;
                    alarmSound.play().catch(e => console.log("Audio play failed"));
                    beepCount++;
                    setTimeout(playSequence, 1000); 
                }
            };
            playSequence();

            let nextMode = 'focus';

            // Cycle Logic
            if (currentMode === 'focus') {
                cyclesCount++;
                // If it's a multiple of 3 (3rd, 6th, etc.), trigger Long Break
                if (cyclesCount % 3 === 0) {
                    nextMode = 'long';
                } else {
                    nextMode = 'short';
                }
            } else {
                // If ending a break, go back to focus
                nextMode = 'focus';
            }

            // Switch mode automatically so the user is ready to click start
            setMode(nextMode);
        }

        function setMode(mode) {
            // Update UI Styles
            document.querySelectorAll('[id^="btn-"]').forEach(btn => {
                btn.classList.remove('bg-white', 'text-black', 'shadow-md');
                btn.classList.add('text-white/70', 'hover:bg-white/10');
            });
            
            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.classList.remove('text-white/70', 'hover:bg-white/10');
            activeBtn.classList.add('bg-white', 'text-black', 'shadow-md');

            // Update State
            currentMode = mode;
            pauseTimer();
            timeLeft = settings[mode] * 60;
            
            // Update Label
            if(mode === 'focus') statusLabel.innerText = "Time to Focus";
            else if(mode === 'short') statusLabel.innerText = "Short Break";
            else statusLabel.innerText = "Long Break";

            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const timeString = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            timerDisplay.innerText = timeString;
            document.title = `${timeString} - Flocs Focus`;
        }

        // --- Settings & Storage ---
        function openSettings() {
            const modal = document.getElementById('settings-modal');
            const content = document.getElementById('modal-content');
            
            // Populate inputs
            document.getElementById('input-focus').value = settings.focus;
            document.getElementById('input-short').value = settings.short;
            document.getElementById('input-long').value = settings.long;
            
            // Populate blur
            const blurVal = settings.blur !== undefined ? settings.blur : 5;
            document.getElementById('input-blur').value = blurVal;
            document.getElementById('blur-value-display').innerText = blurVal + 'px';

            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before opacity transition
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            const content = document.getElementById('modal-content');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            
            // Reset preview to saved setting if cancelled (optional, but good UX)
            // For now, we leave it as user might want to see the effect before saving.
            // But if they cancel, we should technically revert. 
            // However, simplicity: apply saved blur on loadSettings re-call or simple revert:
            applyBlur(settings.blur); 
        }

        function saveSettings() {
            const newFocus = parseInt(document.getElementById('input-focus').value) || 25;
            const newShort = parseInt(document.getElementById('input-short').value) || 5;
            const newLong = parseInt(document.getElementById('input-long').value) || 15;
            const newBlur = parseInt(document.getElementById('input-blur').value) || 0;

            settings = { focus: newFocus, short: newShort, long: newLong, blur: newBlur };
            
            // Save to localStorage
            localStorage.setItem('pomodoroSettings', JSON.stringify(settings));
            
            // Apply Blur permanently
            applyBlur(newBlur);
            
            // If timer was reset/paused, update display immediately
            if (!isRunning) {
                timeLeft = settings[currentMode] * 60;
                updateTimerDisplay();
            }
            
            // Hide modal manually (don't call closeSettings to avoid revert logic)
            const modal = document.getElementById('settings-modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function loadSettings() {
            // Load times
            const savedSettings = localStorage.getItem('pomodoroSettings');
            if (savedSettings) {
                settings = JSON.parse(savedSettings);
                if (settings.blur === undefined) settings.blur = 5; // Default for old saves
                timeLeft = settings.focus * 60; // Default start
            }

            // Load background
            const savedBg = localStorage.getItem('pomodoroBg');
            if (savedBg) {
                bgLayer.style.backgroundImage = `url('${savedBg}')`;
            }
            
            // Apply blur
            applyBlur(settings.blur);
        }

        // --- Background Logic ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            
            reader.onload = function(e) {
                const result = e.target.result;
                
                // Set background immediately
                bgLayer.style.backgroundImage = `url('${result}')`;
                
                // Try to save to localStorage
                try {
                    localStorage.setItem('pomodoroBg', result);
                } catch (err) {
                    alert("Image is too large to save for next time, but it will work for this session!");
                    console.error("Storage limit exceeded", err);
                }
            };
            
            reader.readAsDataURL(file);
        }
        
        function applyBlur(px) {
            bgOverlay.style.backdropFilter = `blur(${px}px)`;
            bgOverlay.style.webkitBackdropFilter = `blur(${px}px)`;
        }

        function previewBlur(px) {
            applyBlur(px);
            document.getElementById('blur-value-display').innerText = px + 'px';
        }

        function clearCustomBackground() {
            localStorage.removeItem('pomodoroBg');
            // Revert to default
            bgLayer.style.backgroundImage = "url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2532&auto=format&fit=crop')";
        }

        // --- Utils ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
